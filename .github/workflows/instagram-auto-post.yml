name: Instagram Auto Post

on:
  schedule:
    # 毎時0分に実行（24回/日、スクリプト側で1日20件制限）
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore instagram-token.json from secret
        run: |
          echo '${{ secrets.INSTAGRAM_TOKEN_JSON }}' > instagram-token.json

      - name: Run Instagram auto-post (1 item)
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
        run: python instagram-auto-post.py --limit 1

      - name: Commit and push posted records
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add instagram-posted.json
          git diff --staged --quiet || git commit -m "Update instagram-posted.json [auto]"
          git pull --rebase origin main || true
          git push
